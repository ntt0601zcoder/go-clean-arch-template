syntax = "proto3";

package account.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/ntt0601zcoder/go-clean-arch-template/internal/gen/account/v1;accountv1";

// AccountService is the sample gRPC surface for the account domain. It mirrors
// the AccountUseCase inbound port. Field rules use buf protovalidate and are
// enforced by the grpcx validation interceptor.
service AccountService {
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);
  rpc UpdateAccount(UpdateAccountRequest) returns (UpdateAccountResponse);
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
}

enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_ACTIVE = 1;
  ACCOUNT_STATUS_INACTIVE = 2;
  ACCOUNT_STATUS_BLOCKED = 3;
  ACCOUNT_STATUS_DELETED = 4;
}

message Account {
  string id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  AccountStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message GetAccountRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}
message GetAccountResponse {
  Account account = 1;
}

message CreateAccountRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.min_len = 8];
  string first_name = 3;
  string last_name = 4;
}
message CreateAccountResponse {
  string id = 1;
}

message UpdateAccountRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  optional string first_name = 2;
  optional string last_name = 3;
  optional AccountStatus status = 4;
}
message UpdateAccountResponse {
  Account account = 1;
}

message DeleteAccountRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}
message DeleteAccountResponse {}

message ListAccountsRequest {
  optional AccountStatus status = 1;
  int32 limit = 2 [(buf.validate.field).int32 = {gte: 0, lte: 200}];
  int32 offset = 3 [(buf.validate.field).int32.gte = 0];
}
message ListAccountsResponse {
  repeated Account accounts = 1;
  int32 total = 2;
}
