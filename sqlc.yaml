version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/adapter/repo/sqlc/schema.sql"
    queries: "internal/adapter/repo/sqlc/query"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/adapter/repo/sqlc/gen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_empty_slices: true
